{% extends 'base.html' %}
{% block title %}Forgot Password - {{ site.site_name }}{% endblock %}
{% block content %}
<div class="min-h-[calc(100vh-56px)] flex items-center justify-center px-4 py-12 bg-[#F7F8FC]">
  <div class="w-full max-w-sm">
    <div class="text-center mb-6">
      <div class="w-10 h-10 bg-[#F0EFFE] rounded flex items-center justify-center mx-auto mb-4">
        <i class="fas fa-lock text-[#635BFF] text-sm"></i>
      </div>
      <h1 class="text-xl font-bold text-[#1A1F36]">Forgot Password?</h1>
      <p class="text-[#697386] mt-1 text-xs">Enter your email and we'll send you a reset link.</p>
    </div>
    <div class="bg-white border border-[#E3E8EF] rounded p-6">
      <form method="POST" class="space-y-4">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <div>
          <label class="block text-[11px] font-semibold text-[#697386] uppercase tracking-widest mb-1.5">Email Address</label>
          <div class="relative">
            <i class="fas fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-[#697386] text-xs"></i>
            <input type="email" name="email" required autofocus
                   class="w-full border border-[#E3E8EF] rounded pl-9 pr-4 py-2.5 text-sm text-[#1A1F36] focus:border-[#635BFF] focus:outline-none transition"
                   placeholder="you@example.com"/>
          </div>
        </div>
        <button type="submit"
                class="w-full bg-[#635BFF] hover:bg-[#4f48e6] text-white font-semibold py-2.5 rounded text-sm transition">
          Send Reset Link
        </button>
      </form>
      <p class="text-center text-xs text-[#697386] mt-4">
        Remember your password?
        <a href="{{ url_for('auth.login') }}" class="text-[#635BFF] font-semibold hover:underline">Sign in</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
