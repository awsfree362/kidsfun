{% extends 'base.html' %}
{% block title %}Forgot Password - {{ site.site_name }}{% endblock %}
{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-indigo-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <i class="fas fa-lock text-indigo-600 text-2xl"></i>
      </div>
      <h1 class="text-2xl font-bold text-gray-800">Forgot Password?</h1>
      <p class="text-gray-500 mt-2 text-sm">Enter your email and we'll send you a reset link.</p>
    </div>
    <div class="bg-white rounded border border-gray-200 shadow-sm p-8">
      <form method="POST" class="space-y-5">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
          <div class="relative">
            <i class="fas fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="email" name="email" required autofocus
                   class="w-full border border-gray-300 rounded pl-10 pr-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
                   placeholder="you@example.com"/>
          </div>
        </div>
        <button type="submit"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded text-sm transition">
          Send Reset Link
        </button>
      </form>
      <p class="text-center text-sm text-gray-500 mt-6">
        Remember your password?
        <a href="{{ url_for('auth.login') }}" class="text-indigo-600 font-semibold hover:underline">Sign in</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
