{% extends 'base.html' %}
{% block title %}Forgot Password - {{ site.site_name }}{% endblock %}
{% block content %}
<div style="min-height:calc(100vh - 68px);display:flex;align-items:center;justify-content:center;padding:48px 24px;background:#F7F8FC;">
  <div style="width:100%;max-width:420px;">
    <div style="text-align:center;margin-bottom:32px;">
      <div style="width:52px;height:52px;border-radius:14px;background:var(--purple-light);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;">
        <i class="fas fa-lock" style="color:var(--purple);font-size:20px;"></i>
      </div>
      <h1 style="font-size:24px;font-weight:800;color:var(--text);letter-spacing:-0.03em;margin:0 0 8px;">Forgot Password?</h1>
      <p style="font-size:14px;color:var(--text-2);margin:0;">Enter your email and we'll send you a reset link.</p>
    </div>
    <div style="background:#fff;border-radius:16px;border:1px solid var(--border);padding:32px;box-shadow:0 1px 2px rgba(0,0,0,.05),0 8px 20px rgba(0,0,0,.04);">
      <form method="POST" style="display:flex;flex-direction:column;gap:20px;">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <div>
          <label style="display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;">Email Address</label>
          <div style="position:relative;">
            <i class="fas fa-envelope" style="position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text-3);font-size:13px;pointer-events:none;"></i>
            <input type="email" name="email" required autofocus placeholder="you@example.com"
                   style="height:44px;width:100%;border-radius:10px;border:1px solid #D1D5DB;padding:0 16px 0 44px;font-size:14px;font-family:'Inter',sans-serif;color:var(--text);outline:none;transition:200ms ease;"
                   onfocus="this.style.borderColor='var(--purple)';this.style.boxShadow='0 0 0 4px rgba(110,65,226,.15)'"
                   onblur="this.style.borderColor='#D1D5DB';this.style.boxShadow='none'"/>
          </div>
        </div>
        <button type="submit"
                style="height:48px;background:var(--purple);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;transition:200ms ease;"
                onmouseover="this.style.background='var(--purple-dark)';this.style.boxShadow='0 4px 16px rgba(110,65,226,.3)'"
                onmouseout="this.style.background='var(--purple)';this.style.boxShadow='none'">
          Send Reset Link
        </button>
      </form>
      <p style="text-align:center;font-size:14px;color:var(--text-2);margin-top:20px;">
        Remember your password?
        <a href="{{ url_for('auth.login') }}" style="font-weight:700;color:var(--purple);">Sign in</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
