{% extends 'base.html' %}
{% block title %}Reset Password - {{ site.site_name }}{% endblock %}
{% block content %}
<div style="min-height:calc(100vh - 68px);display:flex;align-items:center;justify-content:center;padding:48px 24px;background:#F7F8FC;">
  <div style="width:100%;max-width:420px;">
    <div style="text-align:center;margin-bottom:32px;">
      <div style="width:52px;height:52px;border-radius:14px;background:#F0FDF4;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;">
        <i class="fas fa-key" style="color:#15803D;font-size:20px;"></i>
      </div>
      <h1 style="font-size:24px;font-weight:800;color:var(--text);letter-spacing:-0.03em;margin:0 0 8px;">Set New Password</h1>
      <p style="font-size:14px;color:var(--text-2);margin:0;">Choose a strong password for your account.</p>
    </div>
    <div style="background:#fff;border-radius:16px;border:1px solid var(--border);padding:32px;box-shadow:0 1px 2px rgba(0,0,0,.05),0 8px 20px rgba(0,0,0,.04);">
      <form method="POST" style="display:flex;flex-direction:column;gap:20px;">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <div>
          <label style="display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;">New Password</label>
          <div style="position:relative;">
            <i class="fas fa-lock" style="position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text-3);font-size:13px;pointer-events:none;"></i>
            <input type="password" name="password" required minlength="8" autofocus placeholder="Min. 8 characters"
                   style="height:44px;width:100%;border-radius:10px;border:1px solid #D1D5DB;padding:0 16px 0 44px;font-size:14px;font-family:'Inter',sans-serif;color:var(--text);outline:none;transition:200ms ease;"
                   onfocus="this.style.borderColor='var(--purple)';this.style.boxShadow='0 0 0 4px rgba(110,65,226,.15)'"
                   onblur="this.style.borderColor='#D1D5DB';this.style.boxShadow='none'"/>
          </div>
        </div>
        <div>
          <label style="display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;">Confirm Password</label>
          <div style="position:relative;">
            <i class="fas fa-lock" style="position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text-3);font-size:13px;pointer-events:none;"></i>
            <input type="password" name="confirm_password" required placeholder="Repeat password"
                   style="height:44px;width:100%;border-radius:10px;border:1px solid #D1D5DB;padding:0 16px 0 44px;font-size:14px;font-family:'Inter',sans-serif;color:var(--text);outline:none;transition:200ms ease;"
                   onfocus="this.style.borderColor='var(--purple)';this.style.boxShadow='0 0 0 4px rgba(110,65,226,.15)'"
                   onblur="this.style.borderColor='#D1D5DB';this.style.boxShadow='none'"/>
          </div>
        </div>
        <button type="submit"
                style="height:48px;background:#22C55E;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;transition:200ms ease;"
                onmouseover="this.style.background='#16A34A';this.style.boxShadow='0 4px 16px rgba(34,197,94,.3)'"
                onmouseout="this.style.background='#22C55E';this.style.boxShadow='none'">
          Reset Password
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
