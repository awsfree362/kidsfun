{% extends 'base.html' %}
{% block title %}Reset Password - {{ site.site_name }}{% endblock %}
{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <i class="fas fa-key text-green-600 text-2xl"></i>
      </div>
      <h1 class="text-2xl font-bold text-gray-800">Set New Password</h1>
      <p class="text-gray-500 mt-2 text-sm">Choose a strong password for your account.</p>
    </div>
    <div class="bg-white rounded border border-gray-200 shadow-sm p-8">
      <form method="POST" class="space-y-5">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
          <div class="relative">
            <i class="fas fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="password" name="password" required minlength="8" autofocus
                   class="w-full border border-gray-300 rounded pl-10 pr-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
                   placeholder="Min. 8 characters"/>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
          <div class="relative">
            <i class="fas fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="password" name="confirm_password" required
                   class="w-full border border-gray-300 rounded pl-10 pr-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
                   placeholder="Repeat password"/>
          </div>
        </div>
        <button type="submit"
                class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded text-sm transition">
          Reset Password
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
