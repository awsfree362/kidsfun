{% extends 'base.html' %}
{% block title %}Page Not Found - {{ site.site_name }}{% endblock %}
{% block content %}
<div class="min-h-[60vh] flex items-center justify-center px-4">
  <div class="text-center">
    <div class="text-8xl font-extrabold text-indigo-100 mb-4">404</div>
    <h1 class="text-2xl font-bold text-gray-800 mb-2">Page Not Found</h1>
    <p class="text-gray-500 mb-8">The page you're looking for doesn't exist or has been moved.</p>
    <a href="{{ url_for('events.index') }}"
       class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-6 py-3 rounded transition inline-flex items-center gap-2">
      <i class="fas fa-home"></i> Back to Home
    </a>
  </div>
</div>
{% endblock %}
