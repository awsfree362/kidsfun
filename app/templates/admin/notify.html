{% extends 'admin/base.html' %}
{% block title %}Send Notification{% endblock %}
{% block content %}
<div class="page-header">
  <div><div class="page-title">Send Notification</div><div class="page-subtitle">Broadcast messages to users in-app and via email.</div></div>
</div>
<div style="max-width:600px;">
  <div class="card">
    <form method="POST" style="display:flex;flex-direction:column;gap:18px;">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <div>
        <label class="form-label">Recipients</label>
        <select name="target" class="form-select">
          <option value="all">All Active Users</option>
          <option value="confirmed">Users with Confirmed Registrations</option>
        </select>
      </div>
      <div>
        <label class="form-label">Subject / Title</label>
        <input type="text" name="subject" required class="form-input" placeholder="e.g. Important Update About Your Registration"/>
      </div>
      <div>
        <label class="form-label">Message</label>
        <textarea name="message" rows="6" required class="form-input form-textarea" placeholder="Write your message here..."></textarea>
      </div>
      <label style="display:flex;align-items:center;gap:8px;font-size:13.5px;color:var(--text-2);cursor:pointer;">
        <input type="checkbox" name="send_email" value="1" style="width:15px;height:15px;accent-color:var(--primary);"/>
        Also send as email to all recipients
      </label>
      <div class="alert alert-warning">
        <i class="fas fa-exclamation-triangle" style="flex-shrink:0;"></i>
        This creates an in-app notification for all selected users. If email is checked, emails will also be sent.
      </div>
      <button type="submit" class="btn btn-primary" style="justify-content:center;">
        <i class="fas fa-paper-plane"></i> Send Notification
      </button>
    </form>
  </div>
</div>
{% endblock %}
