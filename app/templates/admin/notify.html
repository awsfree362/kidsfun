{% extends 'admin/base.html' %}
{% block title %}Send Notification{% endblock %}
{% block content %}
<div class="flex justify-between items-center mb-6">
  <h1 class="text-2xl font-bold text-gray-800">Send Notification</h1>
</div>

<div class="max-w-2xl">
  <div class="bg-white rounded border border-gray-100 shadow-sm p-6">
    <form method="POST" class="space-y-5">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Recipients</label>
        <select name="target" class="w-full border rounded px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
          <option value="all">All Active Users</option>
          <option value="confirmed">Users with Confirmed Registrations</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Subject / Title</label>
        <input type="text" name="subject" required
               class="w-full border rounded px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
               placeholder="e.g. Important Update About Your Registration"/>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Message</label>
        <textarea name="message" rows="6" required
                  class="w-full border rounded px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
                  placeholder="Write your message here..."></textarea>
      </div>

      <div class="flex items-center gap-2">
        <input type="checkbox" name="send_email" value="1" id="sendEmail" class="w-4 h-4 accent-indigo-600"/>
        <label for="sendEmail" class="text-sm text-gray-700">Also send as email</label>
      </div>

      <div class="bg-amber-50 border border-amber-200 rounded p-3 text-sm text-amber-800">
        <i class="fas fa-exclamation-triangle mr-2"></i>
        This will create an in-app notification for all selected users. If email is checked, it will also send emails.
      </div>

      <button type="submit"
              class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded text-sm transition">
        <i class="fas fa-paper-plane mr-2"></i>Send Notification
      </button>
    </form>
  </div>
</div>
{% endblock %}
