{% extends 'admin/base.html' %}
{% block title %}Navigation{% endblock %}
{% block content %}
<div class="page-header">
  <div><div class="page-title">Navigation Menu</div><div class="page-subtitle">Edit the public site navigation links.</div></div>
</div>
<div style="max-width:640px;" x-data="navManager()">
  <div class="card">
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:20px;" id="navList">
      <template x-for="(item, index) in items" :key="index">
        <div style="display:flex;align-items:center;gap:10px;background:var(--bg);border-radius:var(--radius-md);padding:10px 14px;border:1px solid var(--border);">
          <i class="fas fa-grip-vertical" style="color:var(--text-3);cursor:move;flex-shrink:0;"></i>
          <input x-model="item.label" class="form-input" style="height:36px;font-size:13px;" placeholder="Label"/>
          <input x-model="item.url" class="form-input" style="height:36px;font-size:13px;" placeholder="URL"/>
          <label style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text-2);white-space:nowrap;cursor:pointer;">
            <input type="checkbox" x-model="item.open_in_new_tab" style="accent-color:var(--primary);"/> New tab
          </label>
          <button @click="items.splice(index,1)" class="btn btn-danger btn-xs" style="flex-shrink:0;">
            <i class="fas fa-trash"></i>
          </button>
        </div>
      </template>
      <div x-show="items.length === 0" style="text-align:center;padding:24px;color:var(--text-3);font-size:13.5px;">
        No nav items yet. Click "Add Item" to start.
      </div>
    </div>
    <div style="display:flex;gap:10px;">
      <button @click="addItem()" class="btn btn-secondary"><i class="fas fa-plus"></i> Add Item</button>
      <button @click="saveNav()" class="btn btn-primary"><i class="fas fa-save"></i> Save Navigation</button>
    </div>
    <p style="font-size:12px;color:var(--text-3);margin-top:12px;">Changes take effect immediately on the public site.</p>
  </div>
</div>
<script>
function navManager() {
  return {
    items: {{ items | tojson }},
    addItem() { this.items.push({ label: '', url: '', open_in_new_tab: false, is_active: true }); },
    async saveNav() {
      const r = await fetch('/admin/navigation', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token() }}' },
        body: JSON.stringify(this.items.map((item, i) => ({ ...item, sort_order: i })))
      });
      if (r.ok) { alert('Navigation saved!'); } else { alert('Save failed.'); }
    }
  }
}
</script>
{% endblock %}
