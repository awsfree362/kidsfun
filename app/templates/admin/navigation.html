{% extends 'admin/base.html' %}
{% block title %}Navigation{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold text-gray-800 mb-6">Navigation Menu</h1>
<div class="max-w-2xl bg-white rounded-2xl shadow-sm p-6" x-data="navManager()">
  <div class="space-y-2 mb-6" id="navList">
    <template x-for="(item, index) in items" :key="index">
      <div class="flex items-center gap-3 bg-gray-50 rounded-lg px-3 py-2">
        <i class="fas fa-grip-vertical text-gray-300 cursor-move"></i>
        <input x-model="item.label" class="flex-1 border rounded px-2 py-1 text-sm" placeholder="Label"/>
        <input x-model="item.url" class="flex-1 border rounded px-2 py-1 text-sm" placeholder="URL"/>
        <label class="flex items-center gap-1 text-xs text-gray-500">
          <input type="checkbox" x-model="item.open_in_new_tab"/> New tab
        </label>
        <button @click="items.splice(index,1)" class="text-red-400 hover:text-red-600">
          <i class="fas fa-trash text-xs"></i>
        </button>
      </div>
    </template>
  </div>
  <div class="flex gap-3 mb-6">
    <button @click="addItem()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-indigo-700">
      + Add Item
    </button>
    <button @click="saveNav()" class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-green-700">
      Save Navigation
    </button>
  </div>
  <p class="text-xs text-gray-400">Changes take effect immediately on the frontend.</p>
</div>

<script>
function navManager() {
  return {
    items: {{ items | tojson }},
    addItem() { this.items.push({ label: '', url: '', open_in_new_tab: false, is_active: true }); },
    async saveNav() {
      const r = await fetch('/admin/navigation', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token() }}' },
        body: JSON.stringify(this.items.map((item, i) => ({ ...item, sort_order: i })))
      });
      if (r.ok) alert('Navigation saved!');
    }
  }
}
</script>
{% endblock %}
